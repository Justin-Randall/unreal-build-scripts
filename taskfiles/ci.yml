version: '3'

tasks:
  ci:
    desc: CI fast path (build all + coverage gate)
    cmds:
      - task: doctor
      - task: build:all
      - task: coverage:gate

  ci:full:
    desc: CI full path (ci + integration tests + package all)
    cmds:
      - task: ci
      - task: test:integration
      - task: package:all
